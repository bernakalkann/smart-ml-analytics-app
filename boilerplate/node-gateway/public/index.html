<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Analitik - ML Tahmin Merkezi</title>
    <!-- Modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 25, 40, 0.75);
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #06b6d4;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Arka Plan Dekoratif Işıklar (Vibrant Glows) */
        .glow-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.35;
        }

        .glow-1 {
            background: var(--primary);
            top: 10%;
            left: 10%;
        }

        .glow-2 {
            background: var(--secondary);
            bottom: 15%;
            right: 10%;
        }

        /* Container & Glassmorphic Card */
        .container {
            width: 100%;
            max-width: 580px;
            padding: 20px;
            z-index: 10;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 25px 50px rgba(79, 70, 229, 0.15);
        }

        /* Üst Başlık Bölümü */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .badge-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--secondary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .badge-green {
            color: var(--success);
        }

        /* Form Elemanları */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-color);
            opacity: 0.9;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1rem;
            color: white;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25);
        }

        /* Buton */
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
            border: none;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Sonuç Paneli */
        .result-panel {
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: rgba(79, 70, 229, 0.08);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .result-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--secondary);
            margin-bottom: 10px;
        }

        .result-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Arka Plan Efektleri -->
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <h1>Akıllı Analitik</h1>
                <p>PyTorch ML Destekli Konut Fiyat Tahmin Sistemi</p>
                <div class="badge-container">
                    <div class="badge"><span class="pulse"></span> API Gateway: Aktif</div>
                    <div class="badge badge-green">ML Engine: PyTorch v1.0</div>
                </div>
            </div>

            <!-- Form -->
            <form id="predictForm">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="area">Metrekare (m²)</label>
                        <div class="input-wrapper">
                            <input type="number" id="area" placeholder="Örn: 120" min="20" max="1000" required value="120">
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="rooms">Oda Sayısı</label>
                        <div class="input-wrapper">
                            <input type="number" id="rooms" placeholder="Örn: 3" min="1" max="15" required value="3">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="age">Bina Yaşı</label>
                        <div class="input-wrapper">
                            <input type="number" id="age" placeholder="Örn: 5" min="0" max="100" required value="5">
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="distance">Merkeze Uzaklık (km)</label>
                        <div class="input-wrapper">
                            <input type="number" id="distance" placeholder="Örn: 4.5" min="0.1" max="100" step="0.1" required value="4.5">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn" id="submitBtn">
                    <span class="loader" id="loader"></span>
                    <span id="btnText">Tahmini Değer Üret</span>
                </button>
            </form>

            <!-- Result Panel -->
            <div class="result-panel" id="resultPanel">
                <div class="result-card">
                    <div class="result-label">Tahmin Edilen Ev Değeri</div>
                    <div class="result-value" id="resultPrice">₺0,00</div>
                    <div class="result-meta">
                        <span id="resultModel">Model: v1.0.0</span>
                        <span>•</span>
                        <span id="resultScore">Skor: 0.0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');
            const btnText = document.getElementById('btnText');
            const resultPanel = document.getElementById('resultPanel');
            
            // UI Yükleme Durumu
            submitBtn.disabled = true;
            loader.style.display = 'block';
            btnText.textContent = 'Tahmin Ediliyor...';
            resultPanel.style.display = 'none';

            // Girdi Değerlerini Al
            const area = parseFloat(document.getElementById('area').value);
            const rooms = parseInt(document.getElementById('rooms').value);
            const age = parseInt(document.getElementById('age').value);
            const distance = parseFloat(document.getElementById('distance').value);

            try {
                // Gateway API Uç Noktasına POST İsteği
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        features: [area, rooms, age, distance]
                    })
                });

                const resData = await response.json();
                
                if (resData.success) {
                    const predictionScore = resData.data.prediction;
                    
                    // Örnek PyTorch modeli random ağırlıklı olduğu için tahmini mantıklı 
                    // ev fiyatı seviyesine çekmek amacıyla ufak bir ölçeklendirme formülü:
                    // (Gerçek projede model gerçek fiyatı döner, burada görsel güzellik için ölçekliyoruz)
                    const basePrice = (area * 8500) + (rooms * 75000) - (age * 12000) - (distance * 25000);
                    const finalPrice = Math.max(350000, basePrice + Math.abs(predictionScore * 500000));
                    
                    // Fiyatı TL formatına çevir
                    const formattedPrice = new Intl.NumberFormat('tr-TR', {
                        style: 'currency',
                        currency: 'TRY',
                        minimumFractionDigits: 0,
                        maximumFractionDigits: 0
                    }).format(finalPrice);

                    document.getElementById('resultPrice').textContent = formattedPrice;
                    document.getElementById('resultModel').textContent = `Model: ${resData.data.model_version}`;
                    document.getElementById('resultScore').textContent = `ML Çıktı Skoru: ${predictionScore.toFixed(4)}`;
                    
                    resultPanel.style.display = 'block';
                } else {
                    alert('Hata: ' + (resData.error || 'Tahmin gerçekleştirilemedi.'));
                }
            } catch (error) {
                console.error(error);
                alert('Sunucu hatası! Gateway veya ML API kapalı olabilir.');
            } finally {
                // UI Yükleme Durumunu Kapat
                submitBtn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Tahmini Değer Üret';
            }
        });
    </script>
</body>
</html>
